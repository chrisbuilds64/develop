[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "unit: Pure unit tests (no I/O, no network)",
    "integration: API integration tests (uses TestClient)",
]
asyncio_mode = "auto"
